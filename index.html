<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 AI Study Planner</h1>

        <input type="text" id="taskInput" placeholder="Enter your study task">
        <input type="number" id="hoursInput" placeholder="Hours">
        <button onclick="addTask()">Add Task</button>

        <ul id="taskList"></ul>

        <button class="plan-btn" onclick="generatePlan()">Generate Smart Plan</button>
        <div id="planOutput"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
